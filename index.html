<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1b4332">
  <meta name="description" content="Interactive map of all Thousand Trails campgrounds and RV resorts across North America. Filter by zone, state, and search by name.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Trail Finder">

  <title>Trail Finder — Thousand Trails Map</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="vendor/leaflet.css">

  <!-- MarkerCluster CSS -->
  <link rel="stylesheet" href="vendor/MarkerCluster.css">
  <link rel="stylesheet" href="vendor/MarkerCluster.Default.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- ===== Header ===== -->
  <header class="header">
    <div class="header-left">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <span class="hamburger">
          <span></span><span></span><span></span>
        </span>
      </button>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="100" height="100" rx="18" fill="#2d6a4f"/>
          <polygon points="50,14 90,80 10,80" fill="#52b788"/>
          <polygon points="50,14 70,80 30,80" fill="#40916c"/>
          <ellipse cx="50" cy="80" rx="12" ry="9" fill="#1b4332"/>
          <circle cx="22" cy="30" r="2.2" fill="#d8f3dc" opacity="0.8"/>
          <circle cx="78" cy="24" r="1.6" fill="#d8f3dc" opacity="0.65"/>
        </svg>
        <span class="logo-text">Trail Finder</span>
      </div>
    </div>

    <div class="search-wrapper">
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search campgrounds…"
          autocomplete="off"
          spellcheck="false"
          aria-label="Search campgrounds">
        <button class="search-clear" id="searchClear" aria-label="Clear search">✕</button>
      </div>
    </div>

    <div class="header-right">
      <span class="count-badge" id="countBadge">— parks</span>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <div class="main" id="main">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" aria-label="Campground filters and list">

      <!-- Filters -->
      <div class="filters">
        <div class="filter-section">
          <div class="filter-label">Zone</div>
          <div class="zone-pills" id="zonePills" role="group" aria-label="Filter by zone">
            <button class="pill active" data-zone="all">All</button>
            <button class="pill" data-zone="Northeast">Northeast</button>
            <button class="pill" data-zone="Southeast">Southeast</button>
            <button class="pill" data-zone="Northwest">Northwest</button>
            <button class="pill" data-zone="Southwest">Southwest</button>
            <button class="pill" data-zone="Midwest">Midwest</button>
          </div>
        </div>
        <div class="filter-section">
          <div class="filter-label">State / Province</div>
          <select class="state-select" id="stateSelect" aria-label="Filter by state">
            <option value="all">All States &amp; Provinces</option>
          </select>
        </div>
        <button class="reset-btn" id="resetBtn">Reset filters</button>
      </div>

      <!-- Zone legend -->
      <div class="legend" aria-label="Zone color legend">
        <div class="legend-item"><span class="dot" style="background:var(--ne)"></span>Northeast</div>
        <div class="legend-item"><span class="dot" style="background:var(--se)"></span>Southeast</div>
        <div class="legend-item"><span class="dot" style="background:var(--nw)"></span>Northwest</div>
        <div class="legend-item"><span class="dot" style="background:var(--sw)"></span>Southwest</div>
        <div class="legend-item"><span class="dot" style="background:var(--mw)"></span>Midwest</div>
      </div>

      <!-- List header -->
      <div class="list-header">
        <span id="listCount">Loading…</span>
      </div>

      <!-- Campground list -->
      <ul class="campground-list" id="campgroundList" aria-label="Campground list"></ul>
    </aside>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

    <!-- Map -->
    <div class="map-wrap">
      <div id="map" aria-label="Campground map"></div>

      <!-- Custom map controls -->
      <div class="map-controls">
        <button class="map-btn" id="fitAllBtn" title="Show all campgrounds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </button>
        <button class="map-btn" id="locateBtn" title="My location">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <circle cx="12" cy="12" r="7"/>
            <line x1="12" y1="2" x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="5" y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

  </div><!-- /.main -->
</div><!-- /.app -->

<!-- Leaflet JS -->
<script src="vendor/leaflet.js"></script>

<!-- MarkerCluster JS -->
<script src="vendor/leaflet.markercluster.js"></script>

<script src="app.js"></script>
</body>
</html>
